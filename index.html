<div id="aba-config" class="aba-conteudo erp-panel" style="display:none;">
                    <h3 style="font-size: 1.5rem; font-weight:800; margin-bottom: 2rem;">Aparência e API</h3>
                    
                    <div class="form-group">
                        <label>Integração Google Apps Script URL</label>
                        <input type="text" id="cfg-gas-url" class="form-input" placeholder="https://script.google.com/macros/...">
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group"><label>Nome da Loja</label><input type="text" id="cfg-nome" class="form-input"></div>
                        <div class="form-group"><label>WhatsApp Loja (Apenas números com DDD)</label><input type="tel" id="cfg-zap" class="form-input"></div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label>Cor Primária (Topo, Botões e Destaques)</label>
                            <input type="color" id="cfg-cor-pri" class="form-input" style="height: 50px; padding: 5px; cursor: pointer;">
                        </div>
                        <div class="form-group">
                            <label>Cor Secundária (Textos de destaque e Ícones)</label>
                            <input type="color" id="cfg-cor-sec" class="form-input" style="height: 50px; padding: 5px; cursor: pointer;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>URL da Logomarca (Deixe vazio para usar apenas o Nome da Loja)</label>
                        <input type="text" id="cfg-logo-b64" class="form-input" placeholder="Ex: https://i.imgur.com/sua-logo.png">
                        <img id="preview-logo" src="" style="max-height: 80px; margin-top: 10px; display: none; border-radius: 8px; border: 1px solid var(--border-light); padding: 5px;">
                        <br>
                        <button class="btn-outline" style="width: auto; padding: 0.4rem 1rem; font-size: 0.85rem; margin-top: 10px; cursor: pointer;" onclick="removerLogo()">Remover Logo</button>
                    </div>
                    
                    <div class="form-group">
                        <label>Barra Fixa de Aviso Topo</label>
                        <input type="text" id="cfg-topbar" class="form-input">
                    </div>

                    <div style="background: #F8FAFC; padding: 1.5rem; border-radius: 12px; border: 1px solid #CBD5E1; margin-bottom: 1.5rem;">
                        <h4 style="margin-bottom: 1rem; color: #334155;">Textos da Seção "Sobre a Loja"</h4>
                        <div class="form-group"><label>Título</label><input type="text" id="cfg-about-title" class="form-input"></div>
                        <div class="form-group"><label>Descrição (Linha 1)</label><input type="text" id="cfg-about-p1" class="form-input"></div>
                        <div class="form-group" style="margin-bottom: 0;"><label>Descrição (Linha 2)</label><input type="text" id="cfg-about-p2" class="form-input"></div>
                    </div>

                    <button class="btn btn-primary" onclick="salvarConfiguracoesGlobais()">Salvar Configurações Gerais</button>
                    
                    <hr style="border:0; border-top:1px solid var(--border-light); margin: 3rem 0;">

                    <h3 style="font-size: 1.2rem; font-weight:700; margin: 3rem 0 1.5rem;">Banners Rotativos</h3>
                    <button class="btn btn-outline" style="margin-bottom:1.5rem; width:auto; padding:0.5rem 1rem;" onclick="abrirModalBanner()">+ Adicionar Banner</button>
                    <div id="lista-adm-banners" style="display: grid; grid-template-columns: 1fr; gap: 1rem;"></div>
                </div>
